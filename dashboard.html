<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>采采录 · 儿童大屏</title>
  <link rel="icon" href="/favicon.ico" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; }
    #dashboard-app { width: 100%; min-height: 100vh; }
    .boot-loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 16px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; }
    .boot-loading .logo { width: 80px; height: 80px; border-radius: 16px; }
    .boot-loading .title { font-size: 18px; font-weight: 600; }
    .boot-loading .spinner { width: 32px; height: 32px; border: 3px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="dashboard-app">
    <div class="boot-loading">
      <img src="/logo.gif" class="logo" alt="Logo" />
      <div class="title">采采录 · 儿童大屏</div>
      <div class="spinner"></div>
    </div>
  </div>
  <script type="module" src="./src/dashboard.ts"></script>
</body>
</html>
